name: CI

on:
  pull_request:
    branches: [main, rc, '*-RC']
  push:
    branches: [main, rc]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prettier --check .
      - run: npx eslint src/
      - run: npm run lint # TypeScript type checking

  test:
    strategy:
      # Run the suite on both platforms; don't cancel one when the other fails.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test
